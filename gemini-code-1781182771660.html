<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Düsseldorf Karolingerplatz Live Monitor</title>
    <style>
        body { 
            margin: 0; 
            background: #000; 
            color: #ff9900; 
            font-family: 'Courier New', monospace; 
            overflow: hidden; 
            display: flex; 
            height: 100vh; 
        }
        .panel { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            border: 1px solid #222; 
        }
        .header { 
            text-align: center; 
            font-size: 1.5rem; 
            font-weight: bold; 
            padding: 15px; 
            border-bottom: 2px solid #ff9900; 
            background: #000; 
            letter-spacing: 1px;
        }
        .list { 
            flex: 1; 
            padding: 20px; 
            overflow-y: auto; 
        }
        .row { 
            display: flex; 
            justify-content: space-between; 
            font-size: 1.4rem; 
            margin-bottom: 12px; 
            padding-bottom: 4px; 
        }
        .line { width: 15%; font-weight: bold; }
        .dest { width: 65%; text-align: left; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .time { width: 20%; text-align: right; }
    </style>
</head>
<body>

    <div class="panel" style="border-right: 2px solid #ff9900;">
        <div class="header">➔ RATINGEN / GERRESHEIM</div>
        <div class="list" id="north-list">Loading live board...</div>
    </div>
    
    <div class="panel">
        <div class="header">➔ BENRATH / UNI OST</div>
        <div class="list" id="south-list">Loading live board...</div>
    </div>
