            overflow: hidden; 
            display: flex;

        }
        .panel { 
            flex: 1; 
            display: flex; 
            flex-direction: column;

        }
        .header { 
            text-align: center;

            letter-spacing: 2px;
        }
        .list { 
            flex: 1; 
            padding: 20px; 
            overflow: hidden; /* Strips scrollbars to mimic physical screen boundaries */
        }
        .row { 
            font-size: 1.5rem; 
            line-height: 1.8rem;
            margin-bottom: 10px; 
            white-space: pre; /* Forces multiple consecutive spaces to render exactly for grid alignment */
            letter-spacing: 1px;
            /* Subtly simulates individual glowing digital LED text elements */
            text-shadow: 0 0 2px rgba(255, 153, 0, 0.6); 
        }
        .status-msg {
            font-size: 1.3rem;
            color: #444; /* Dimmed text for idle or system loading states */
        }
    </style>
