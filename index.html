<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; background: #000; color: #ff9900; font-family: 'Courier New', monospace; overflow: hidden; display: flex; height: 100vh; }
        .panel { flex: 1; display: flex; flex-direction: column; border: 1px solid #333; }
        .header { display: flex; justify-content: space-between; align-items: center; font-size: 1.5rem; font-weight: bold; padding: 10px 20px; border-bottom: 2px solid #ff9900; }
        iframe { flex: 1; border: none; }
    </style>
</head>
<body>
    <div class="panel">
        <div class="header">
            <span>➔ Karolingerplatz Departures</span>
            <span id="live-clock">00:00:00</span>
        </div>
        <iframe src="https://vrrf.finalrewind.org/Düsseldorf/Karolingerplatz?frontend=infoscreen&theme=dark&lines=U72,U73,704,705"></iframe>
    </div>

    <script>
        // Script to update the actual time of day in the header
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('live-clock').textContent = `${hours}:${minutes}:${seconds}`;
        }
        
        // Refresh clock every second
        updateClock();
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
