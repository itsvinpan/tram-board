<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; background: #000; color: #ff9900; font-family: 'Courier New', monospace; display: flex; height: 105vh; }
        .panel { flex: 1; display: flex; flex-direction: column; border: 1px solid #333; }
        .header { display: flex; justify-content: space-between; align-items: center; font-size: 1.5rem; font-weight: bold; padding: 10px 20px; border-bottom: 2px solid #ff9900; }
        iframe { flex: 1; border: none; }
    </style>
</head>
<body>
    <div class="panel">
        <div class="header">
            <span>➔ Karolingerplatz Departures</span>
            <span id="live-clock">00:00:00</span>
        </div>
        <iframe id="departure-board" src="https://vrrf.finalrewind.org/D%C3%BCsseldorf/Karolingerplatz?frontend=infoscreen&theme=dark&lines=U72,U73,704,705"></iframe>
    </div>

    <script>
        // --- 1. Live Clock Logic ---
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('live-clock').textContent = `${hours}:${minutes}:${seconds}`;
        }
        updateClock();
        setInterval(updateClock, 1000);

        // --- 2. Tap to Fullscreen Logic ---
        document.body.addEventListener('click', () => {
            let elem = document.documentElement;
            if (elem.requestFullscreen) {
                elem.requestFullscreen();
            } else if (elem.webkitRequestFullscreen) { /* Safari/Silk fallback */
                elem.webkitRequestFullscreen();
            } else if (elem.msRequestFullscreen) { /* IE11 fallback */
                elem.msRequestFullscreen();
            }
        });

        // --- 3. Board Auto-Refresh Logic (FIXED) ---
        // Use the encoded URL as a strict baseline
        const boardUrl = "https://vrrf.finalrewind.org/Duesseldorf/Karolingerplatz?frontend=infoscreen&theme=dark&lines=U72,U73,704,705";
        
        setInterval(() => {
            const board = document.getElementById('departure-board');
            // Appending a unique timestamp forces Silk to fetch a clean, new page
            board.src = boardUrl + "&_t=" + Date.now(); 
        }, 30000); 
    </script>
</body>
</html>
