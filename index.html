<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Karolingerplatz Live Board</title>
    <style>
        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: #000; 
            color: #ff9900; 
            font-family: 'Courier New', Courier, monospace; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
        }
        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            font-size: 1.8rem; font-weight: bold; 
            padding: 15px 20px; border-bottom: 3px solid #ff9900; 
            background: #000; letter-spacing: 1px; 
        }
        .list-container { 
            flex: 1; padding: 20px; overflow-y: auto; 
        }
        .row { 
            display: flex; justify-content: flex-start; 
            font-size: 1.5rem; margin-bottom: 15px; 
            border-bottom: 1px dashed #222; padding-bottom: 6px; 
        }
        .line { width: 15%; font-weight: bold; }
        .dest { width: 50%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .actual-time { width: 15%; text-align: right; color: #cc7a00; }
        .countdown { width: 20%; text-align: right; }
        
        #alexa-keepawake { position: absolute; width: 1px; height: 1px; opacity: 0.01; pointer-events: none; }
    </style>
</head>
<body>

    <video id="alexa-keepawake" autoplay loop muted playsinline>
        <source src="data:video/mp4;base64,AAAAIGZ0eXBtcDQyAAAAAG1wNDJpc29tdm00MQAAAAloZWQzAAAAAG1vb3YAAABsbXZoZAAAAADU7gVw1O4FcAAAA+gAAAAAAAEAAAEAAAAAAAAAAAAAAAABAAAAAAAAAAAAAAAAAAAAAQAAAAAAAAAAAAAAAAAAQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAIAAAJuYnRyawAAAC10cmtoAAAAAtU7gVw1O4FcAAAAAQAAAAAAdwAAAAAAAAAAAAAAAAAAAAAAAAEAAAAAAQAAAAAAAAAAAAAAAAAAAAEAAAAAAAAAAAAAAAAAAEAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAACbWRpYQAAACValidkaGQAAAAA1O4FwNTuBXAAAAAAAQAAAAABVlhgAQAAAC1oZGxyAAAAAAAAAAB2aWRlAAAAAAAAAAAAAAAAVmlkZW9IYW5kbGVyAAAAAWhtZGluZgAAABRkaW5mAAAAHGRyZWYAAAAAAAAAAQAAAAxtdXJsAAAAAQAAAVRzdGJsAAAAbXN0c2QAAAAAAAAAAQAAAF9tcDR2AAAAAAAAAAEAAAAAAAAAAAAAAAAAAAAAABgAGABjdXJsAAAAAYN0cHRzAAAAFGN0dHMAAAAAAAAAAQAAAAEAAAAsY29scgBwcm9mcHVuYwAAAAAYbWQhdAAAAADU7gVw1O4FcAAAAAAAQAABc3RzYwAAAAAAAAABAAAAAQAAAAEAAAABAAAAFHN0c3oAAAAAAAAADwAAAAEAAAAAc3RjbwAAAAAAAAABAAAAMAAAAGd1ZHRhAAAAW21ldGEAAAAAAAAAIWhkbHIAAAAAAAAAAG1kcm0AAAAAAAAAAAAAAAAAAAAAADYAaWxzdAAAAC50b28AAAAmZGF0YQAAAAEAAAAATGF2ZiA2MC4zLjEwMCAoR05VKSBsaWJ4MjY0AAAAGHV1dWlkAAAAAAAAAAAAAAAAAAAAAA==" type="video/mp4">
    </video>

    <div class="header">
        <span>➔ Karolingerplatz Departures</span>
        <span id="live-clock">00:00:00</span>
    </div>
    
    <div class="list-container" id="tram-list">
        Syncing real-time transit data...
    </div>

    <script>
        const proxyUrl = "https://corsproxy.io/?";
        const dbfUrl = "https://dbf.finalrewind.org/Düsseldorf,Karolingerplatz.json?version=3&efa=VRR";
        const targetLines = ["U72", "U73", "704", "705"];

        function updateHeaderClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('live-clock').textContent = `${h}:${m}:${s}`;
        }
        setInterval(updateHeaderClock, 1000);
        updateHeaderClock();

        async function fetchTramData() {
            try {
                const response = await fetch(proxyUrl + encodeURIComponent(dbfUrl));
                const payload = await response.json();
                const departures = payload.departures || payload.results;

                if (!departures) return;

                const listContainer = document.getElementById('tram-list');
                listContainer.innerHTML = '';

                departures.forEach(tram => {
                    const line = (tram.line || tram.train || "").trim();
                    const destination = (tram.destination || "").trim();
                    
                    if (targetLines.includes(line)) {
                        
                        let countdownStr = "now";
                        let actualTimeStr = "--:--";
                        let targetDate = null;

                        // 1. Hunt down the hidden timestamp using all known database keys
                        let timeStringToParse = null;
                        const knownKeys = ['realTime', 'rt_dep', 'scheduledTime', 'sched_dep', 'departure', 'scheduledDeparture', 'time'];
                        for (const key of knownKeys) {
                            if (tram[key]) {
                                timeStringToParse = tram[key];
                                break;
                            }
                        }

                        // Fallback: If they changed the key name again, aggressively scan the raw values for HH:MM format
                        if (!timeStringToParse) {
                            for (const key in tram) {
                                if (typeof tram[key] === 'string' && (tram[key].match(/^\d{1,2}:\d{2}$/) || tram[key].match(/T\d{2}:\d{2}/))) {
                                    timeStringToParse = tram[key];
                                    break;
                                }
                            }
                        }

                        // 2. Parse the located time string into a rigid local Date Object
                        if (timeStringToParse) {
                            if (/^\d{1,2}:\d{2}$/.test(timeStringToParse)) {
                                // Maps basic HH:MM outputs (e.g., "22:04") to today's date
                                let parts = timeStringToParse.split(':');
                                targetDate = new Date();
                                targetDate.setHours(parseInt(parts[0], 10), parseInt(parts[1], 10), 0, 0);
                                
                                // Midnight wraparound logic (if a train reads 00:15 but it is currently 23:55)
                                if (targetDate.getTime() < Date.now() - 4 * 3600000) {
                                    targetDate.setDate(targetDate.getDate() + 1);
                                }
                            } else {
                                // Maps standard ISO formats (e.g., "2026-06-11T22:04:00")
                                targetDate = new Date(timeStringToParse);
                            }
                        } else if (tram.countdown !== undefined) {
                            // Absolute fallback: Map the minute integer to a date
                            targetDate = new Date();
                            targetDate.setMinutes(targetDate.getMinutes() + parseInt(tram.countdown, 10));
                        }

                        // 3. Format into output variables
                        if (targetDate && !isNaN(targetDate.getTime())) {
                            actualTimeStr = targetDate.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
                            
                            const gapMs = targetDate.getTime() - Date.now();
                            const calculatedMins = Math.floor(gapMs / 60000); 
                            
                            countdownStr = calculatedMins <= 0 ? "now" : calculatedMins + " min";
                        }

                        // 4. Print the final row
                        const row = `
                            <div class="row">
                                <span class="line">${line}</span>
                                <span class="dest">${destination}</span>
                                <span class="actual-time">${actualTimeStr}</span>
                                <span class="countdown">${countdownStr}</span>
                            </div>
                        `;
                        
                        listContainer.innerHTML += row;
                    }
                });

                if (listContainer.innerHTML === '') {
                    listContainer.innerHTML = '<div class="row">No active trams</div>';
                }

            } catch (error) {
                console.error("Data error. Waiting for next cycle:", error);
            }
        }

        fetchTramData();
        setInterval(fetchTramData, 30000); // 30-sec continuous sync interval

        document.addEventListener("DOMContentLoaded", function() {
            document.getElementById("alexa-keepawake").play().catch(e => console.log(e));
        });
    </script>
</body>
</html>
